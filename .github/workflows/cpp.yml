name: C++

on:
  push:
    paths:
      - 'cpp/**'
  pull_request:
    paths:
      - 'cpp/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        gcc-version: ["12", "13", "14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up g++ ${{ matrix.gcc-version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-${{ matrix.gcc-version }}
          g++-${{ matrix.gcc-version }} --version
      - name: Run C++ labs
        env:
          CXX: g++-${{ matrix.gcc-version }}
        run: |
          chmod +x run_cpp.sh
          ./run_cpp.sh
